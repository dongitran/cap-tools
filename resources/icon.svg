<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1AAFFF"/>
      <stop offset="50%" stop-color="#0070F2"/>
      <stop offset="100%" stop-color="#003FBF"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D0EAFF" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Hexagon background -->
  <polygon
    points="50,4 91,27 91,73 50,96 9,73 9,27"
    fill="url(#hexGrad)"
    rx="4"
  />

  <!-- Inner glow ring -->
  <polygon
    points="50,10 85,30 85,70 50,90 15,70 15,30"
    fill="none"
    stroke="rgba(255,255,255,0.15)"
    stroke-width="1.5"
  />

  <!-- Main bolt shape (top part - pointing right-down) -->
  <polygon
    points="57,16 37,50 51,50 43,84 63,50 49,50"
    fill="url(#boltGrad)"
    filter="url(#glow)"
  />

  <!-- Small DB lines at bottom right (credential/HANA symbol) -->
  <ellipse cx="72" cy="71" rx="11" ry="4" fill="rgba(255,255,255,0.55)"/>
  <path d="M61,71 Q61,77 72,77 Q83,77 83,71" fill="rgba(255,255,255,0.35)" stroke="rgba(255,255,255,0.55)" stroke-width="0.8"/>

  <!-- Small debug dot top-left -->
  <circle cx="28" cy="30" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="28" cy="30" r="2" fill="rgba(255,255,255,0.9)"/>
</svg>
