<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- ── Warm amber → deep burnt-orange background ── -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="256" y2="256"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FF9C22"/>
      <stop offset="48%"  stop-color="#D96A06"/>
      <stop offset="100%" stop-color="#8E3200"/>
    </linearGradient>

    <!-- ── Specular shine: top-left bright spot ── -->
    <radialGradient id="shine" cx="72" cy="54" r="140"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Dark vignette: bottom-right depth ── -->
    <radialGradient id="vignette" cx="210" cy="220" r="180"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Subtle hex-grid overlay (SAP BTP motif) ── -->
    <pattern id="hexPat" x="0" y="0" width="36" height="32"
             patternUnits="userSpaceOnUse">
      <polygon points="18,1 33,9 33,24 18,32 3,24 3,9"
               fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>

    <!-- ── Wrench drop shadow + ambient ── -->
    <filter id="wrenchFx" x="-20%" y="-20%" width="140%" height="140%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="3" dy="6" in="blur" result="offset"/>
      <feFlood flood-color="#3E1200" flood-opacity="0.55" result="flood"/>
      <feComposite in="flood" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Clip all layers to rounded square ── -->
    <clipPath id="card">
      <rect width="256" height="256" rx="46"/>
    </clipPath>

  </defs>

  <!-- ════════ CARD BACKGROUND ════════ -->
  <rect width="256" height="256" rx="46" fill="url(#bgGrad)"/>

  <!-- Hex texture (clipped) -->
  <rect width="256" height="256" fill="url(#hexPat)"
        clip-path="url(#card)"/>

  <!-- Specular shine -->
  <rect width="256" height="256" rx="46" fill="url(#shine)"/>

  <!-- Depth vignette -->
  <rect width="256" height="256" rx="46" fill="url(#vignette)"/>

  <!-- Inner highlight border -->
  <rect x="2.5" y="2.5" width="251" height="251" rx="43.5"
        fill="none"
        stroke="#ffffff" stroke-opacity="0.17"
        stroke-width="2.5"/>

  <!-- ════════ WRENCH ════════
       Open-end wrench, rotated -45° around canvas centre (128,128).

       Before rotation (upright):
         Head    x 74–182  y 38–105  (108 × 67 px)
         Jaw cut x 97–159  y  20–82  → open slot at top of head
         Handle  x 112–144 y 105–224 (32 × 119 px) with rounded butt
  ═══════════════════════════════════ -->
  <g transform="rotate(-45, 128, 128)" filter="url(#wrenchFx)">
    <path
      fill-rule="evenodd"
      fill="white"
      opacity="0.97"
      d="
        M 74,44
        Q 74,38 80,38
        L 176,38
        Q 182,38 182,44
        L 182,105
        L 144,105
        L 144,212
        Q 144,224 128,224
        Q 112,224 112,212
        L 112,105
        L 74,105
        Z

        M 97,16
        L 159,16
        L 159,78
        Q 159,84 153,84
        L 103,84
        Q 97,84 97,78
        Z
      "
    />
  </g>

</svg>
