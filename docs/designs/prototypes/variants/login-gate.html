<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Gate Prototype</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../assets/login-gate.css?v=20260412j" />
  </head>
  <body class="login-gate-page vscode-dark">
    <main class="login-shell">
      <header class="layout-head">
        <div class="layout-title-row">
          <h1>SAP Tools Login</h1>
          <span class="layout-chip">Secure</span>
        </div>
        <p class="layout-subline">Connect your SAP account to open region workspace.</p>
      </header>

      <section class="login-card" aria-label="SAP credential setup">
        <form id="login-gate-form" class="login-form" novalidate>
          <div class="field-row">
            <label for="sap-email">SAP Email</label>
            <input
              id="sap-email"
              name="sap-email"
              type="email"
              autocomplete="email"
              placeholder="developer@company.com"
              required
            />
          </div>

          <div class="field-row">
            <label for="sap-password">SAP Password</label>
            <input
              id="sap-password"
              name="sap-password"
              type="password"
              autocomplete="current-password"
              placeholder="Enter SAP password"
              required
            />
          </div>

          <p id="form-status" class="form-status" role="status" aria-live="polite"></p>

          <button id="submit-login-gate" type="submit">Save and Continue</button>
        </form>
      </section>
    </main>

    <script type="module" src="../assets/login-gate.js?v=20260412j"></script>
  </body>
</html>
