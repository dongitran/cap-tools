<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CFLogs Panel Prototype</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../assets/cf-logs-panel.css?v=20260414h" />
  </head>
  <body class="cf-logs-panel-page vscode-dark">
    <main class="panel-prototype-shell">
      <section class="editor-area" aria-hidden="true"></section>

      <section class="panel-area" aria-label="Bottom panel">
        <nav class="panel-tabs" aria-label="Panel tabs">
          <button type="button" class="panel-tab">Problems</button>
          <button type="button" class="panel-tab">Output</button>
          <button type="button" class="panel-tab">Terminal</button>
          <button type="button" class="panel-tab is-active" aria-current="true">CFLogs</button>
        </nav>

        <section class="cf-logs-panel" aria-label="CFLogs panel content">
          <p id="workspace-scope" class="workspace-scope" hidden></p>

          <!-- Filter bar + gear button -->
          <section class="filter-inline" aria-label="CF log filters">
            <div class="filter-item filter-item-app">
              <select id="filter-app" aria-label="Select app">
                <option value="">— no apps loaded —</option>
              </select>
            </div>
            <div class="filter-item filter-item-search">
              <input
                id="filter-search"
                type="search"
                placeholder="message, logger"
                aria-label="Search logs"
              />
            </div>
            <div class="filter-item filter-item-level">
              <select id="filter-level" aria-label="Filter by level">
                <option value="all">All</option>
              </select>
            </div>
            <button
              type="button"
              class="gear-button"
              id="settings-toggle"
              aria-label="Column settings"
              aria-controls="settings-panel"
              aria-expanded="false"
            >
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                <path d="M8 5a3 3 0 1 0 0 6A3 3 0 0 0 8 5zm0 1a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
                <path d="M9.796 1.343a.5.5 0 0 0-.832-.656l-.89 1.126a4.02 4.02 0 0 0-.632-.188l-.258-1.4a.5.5 0 0 0-.984 0l-.258 1.4a4.02 4.02 0 0 0-.633.188L4.22.687a.5.5 0 0 0-.832.656l.818 1.034a4.04 4.04 0 0 0-.396.556l-1.397-.258a.5.5 0 0 0 0 .984l1.397.258c.077.193.173.379.283.555L3.28 5.523a.5.5 0 0 0 .656.832l1.034-.818c.176.11.362.206.555.283l.258 1.397a.5.5 0 0 0 .984 0l.258-1.397a4.04 4.04 0 0 0 .556-.283l1.034.818a.5.5 0 0 0 .832-.656l-.818-1.034c.11-.176.206-.362.283-.555l1.397-.258a.5.5 0 0 0 0-.984l-1.397-.258a4.04 4.04 0 0 0-.283-.556l.818-1.034z"/>
              </svg>
            </button>
          </section>

          <!-- Column visibility settings panel (hidden by default) -->
          <div
            class="settings-panel"
            id="settings-panel"
            aria-hidden="true"
            hidden
          >
            <span class="settings-panel-label">Columns</span>
            <div class="settings-column-toggles" id="settings-column-toggles">
              <!-- populated by JS -->
            </div>
          </div>

          <div class="table-shell" role="region" aria-label="Filtered logs table">
            <table class="cf-log-table" aria-describedby="table-summary">
              <!-- thead is built dynamically by JS based on visible columns -->
              <thead id="log-table-head"><tr></tr></thead>
              <tbody id="log-table-body"></tbody>
            </table>
          </div>

          <p id="table-summary" class="table-summary" role="status" aria-live="polite"></p>
        </section>
      </section>
    </main>

    <!-- Toast shown briefly when a row is clicked and message is copied -->
    <div class="copy-toast" id="copy-toast" role="status" aria-live="polite" aria-atomic="true">Copied!</div>

    <script type="module" src="../assets/cf-logs-panel.js?v=20260414h"></script>
  </body>
</html>
