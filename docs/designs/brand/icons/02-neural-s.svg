<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Card background -->
    <radialGradient id="I02-bg" cx="128" cy="128" r="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#001820"/>
      <stop offset="100%" stop-color="#030A12"/>
    </radialGradient>

    <!-- Node glow -->
    <filter id="I02-nodeGlow" x="-200%" y="-200%" width="500%" height="500%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Line glow -->
    <filter id="I02-lineGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="I02-card">
      <rect width="256" height="256" rx="46"/>
    </clipPath>

  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="256" height="256" rx="46" fill="url(#I02-bg)"/>

  <!-- Subtle ambient glow center -->
  <circle cx="128" cy="128" r="80"
          fill="#003344" opacity="0.15" clip-path="url(#I02-card)"/>

  <!-- ══════════════════════════════
       NODE POSITIONS (S-path, 13 nodes):
       1.  (176, 56)   — top right endpoint
       2.  (140, 44)   — top edge right
       3.  (104, 46)   — top edge left
       4.  (78, 64)    — upper left curve
       5.  (70, 96)    — left side going down
       6.  (88, 120)   — lower-left, starting right
       7.  (128, 128)  — center crossing
       8.  (168, 118)  — right of center going down
       9.  (180, 150)  — right side going down
       10. (170, 182)  — lower right curve
       11. (144, 204)  — bottom right
       12. (108, 206)  — bottom left
       13. (80, 196)   — bottom left endpoint
  ══════════════════════════════ -->

  <!-- ── CONNECTION LINES (drawn first, behind nodes) ── -->

  <!-- Primary S-path connections (line width 1.8) -->
  <g stroke="#22D3EE" stroke-width="1.8" stroke-linecap="round" opacity="0.5"
     filter="url(#I02-lineGlow)">
    <line x1="176" y1="56"  x2="140" y2="44"/>   <!-- 1-2 -->
    <line x1="140" y1="44"  x2="104" y2="46"/>   <!-- 2-3 -->
    <line x1="104" y1="46"  x2="78"  y2="64"/>   <!-- 3-4 -->
    <line x1="78"  y1="64"  x2="70"  y2="96"/>   <!-- 4-5 -->
    <line x1="70"  y1="96"  x2="88"  y2="120"/>  <!-- 5-6 -->
    <line x1="88"  y1="120" x2="128" y2="128"/>  <!-- 6-7 -->
    <line x1="128" y1="128" x2="168" y2="118"/>  <!-- 7-8 -->
    <line x1="168" y1="118" x2="180" y2="150"/>  <!-- 8-9 -->
    <line x1="180" y1="150" x2="170" y2="182"/>  <!-- 9-10 -->
    <line x1="170" y1="182" x2="144" y2="204"/>  <!-- 10-11 -->
    <line x1="144" y1="204" x2="108" y2="206"/>  <!-- 11-12 -->
    <line x1="108" y1="206" x2="80"  y2="196"/>  <!-- 12-13 -->
  </g>

  <!-- Cross-connections (shortcut neural links, thinner/dimmer) -->
  <g stroke="#00B4D8" stroke-width="1.2" stroke-linecap="round" opacity="0.3">
    <!-- Top shortcuts -->
    <line x1="176" y1="56"  x2="104" y2="46"/>   <!-- 1-3 -->
    <line x1="140" y1="44"  x2="78"  y2="64"/>   <!-- 2-4 -->
    <!-- Upper-left shortcuts -->
    <line x1="78"  y1="64"  x2="88"  y2="120"/>  <!-- 4-6 -->
    <line x1="70"  y1="96"  x2="128" y2="128"/>  <!-- 5-7 -->
    <!-- Right-side shortcuts -->
    <line x1="168" y1="118" x2="170" y2="182"/>  <!-- 8-10 -->
    <line x1="180" y1="150" x2="144" y2="204"/>  <!-- 9-11 -->
    <!-- Bottom shortcuts -->
    <line x1="144" y1="204" x2="80"  y2="196"/>  <!-- 11-13 -->
  </g>

  <!-- ── GLOW HALOS (behind node bodies) ── -->
  <g fill="#22D3EE" filter="url(#I02-nodeGlow)">
    <!-- Largest glow: key positions 1, 7, 13 -->
    <circle cx="176" cy="56"  r="10" opacity="0.3"/>
    <circle cx="128" cy="128" r="12" opacity="0.35"/>
    <circle cx="80"  cy="196" r="10" opacity="0.3"/>
    <!-- Medium glow: corner nodes -->
    <circle cx="78"  cy="64"  r="7"  opacity="0.2"/>
    <circle cx="70"  cy="96"  r="7"  opacity="0.2"/>
    <circle cx="180" cy="150" r="7"  opacity="0.2"/>
    <circle cx="170" cy="182" r="7"  opacity="0.2"/>
  </g>

  <!-- ── NODE BODIES ── -->
  <!-- Large nodes: endpoint top, center, endpoint bottom -->
  <g fill="#22D3EE">
    <circle cx="176" cy="56"  r="7"/>   <!-- 1 top-right -->
    <circle cx="80"  cy="196" r="7"/>   <!-- 13 bottom-left -->
  </g>
  <circle cx="128" cy="128" r="9" fill="#22D3EE"/>  <!-- 7 center (largest) -->

  <!-- Medium nodes: corners / key curves -->
  <g fill="#22D3EE" opacity="0.85">
    <circle cx="78"  cy="64"  r="5.5"/>  <!-- 4 upper-left corner -->
    <circle cx="70"  cy="96"  r="5"/>    <!-- 5 left side -->
    <circle cx="168" cy="118" r="5.5"/>  <!-- 8 right side -->
    <circle cx="180" cy="150" r="5"/>    <!-- 9 right going down -->
    <circle cx="170" cy="182" r="5.5"/>  <!-- 10 lower-right corner -->
  </g>

  <!-- Small nodes: midpoints on curves -->
  <g fill="#0EA5E9" opacity="0.8">
    <circle cx="140" cy="44"  r="4"/>   <!-- 2 -->
    <circle cx="104" cy="46"  r="4"/>   <!-- 3 -->
    <circle cx="88"  cy="120" r="4"/>   <!-- 6 -->
    <circle cx="144" cy="204" r="4"/>   <!-- 11 -->
    <circle cx="108" cy="206" r="4"/>   <!-- 12 -->
  </g>

  <!-- Inner specular highlights on big nodes -->
  <g fill="white" opacity="0.8">
    <circle cx="176" cy="56"  r="2.8"/>
    <circle cx="128" cy="128" r="3.5"/>
    <circle cx="80"  cy="196" r="2.8"/>
    <circle cx="78"  cy="64"  r="2"/>
    <circle cx="170" cy="182" r="2"/>
  </g>

  <!-- ── INNER BORDER ── -->
  <rect x="3" y="3" width="250" height="250" rx="44"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.07"/>

</svg>
