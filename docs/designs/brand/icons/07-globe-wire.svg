<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Dark tech background -->
    <radialGradient id="I07-bg" cx="128" cy="128" r="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#001420"/>
      <stop offset="70%"  stop-color="#020C18"/>
      <stop offset="100%" stop-color="#030A12"/>
    </radialGradient>

    <!-- Globe glow (outer sphere edge) -->
    <filter id="I07-sphereGlow" x="-10%" y="-10%" width="120%" height="120%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Node glow -->
    <filter id="I07-nodeGlow" x="-200%" y="-200%" width="500%" height="500%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arc connection glow -->
    <filter id="I07-arcGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Globe clip circle -->
    <clipPath id="I07-globeClip">
      <circle cx="128" cy="128" r="104"/>
    </clipPath>

    <clipPath id="I07-card">
      <rect width="256" height="256" rx="46"/>
    </clipPath>

  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="256" height="256" rx="46" fill="url(#I07-bg)"/>

  <!-- Subtle global ambiance -->
  <circle cx="128" cy="128" r="108"
          fill="#0EA5E9" opacity="0.04" clip-path="url(#I07-card)"/>

  <!-- ══════════════════════════════
       GLOBE WIREFRAME
       Sphere radius: 104, center: (128,128)

       Latitude lines (horizontal ellipses, r=104):
       - Equator (0°): circle r=104
       - 30°N: rx=104*cos30°=90, ry=104*sin30°=52 centered at y=128-0=128 → y-offset = 0
         Actually latitude circle at lat L: projected rx=104*cos(L), at y=128+104*sin(L)
       - 30°N: rx=90, ry=17.5 (appearance of circle at 30° lat), at y=128-52=76
       Wait - for a front-facing orthographic globe:
         Circle at latitude L = ellipse at y = 128 - 104*sin(L), rx = 104*cos(L), ry = 5 (very flat)
         No wait, these are just circles projected orthographically. Each lat circle has:
           Center y = 128 + 104*sin(L) [positive L = south]
           Radius in X = 104*cos(L)
           It appears as a horizontal line (or ellipse with zero height) in pure orthographic...

       Actually in a globe icon, latitude lines are shown as ellipses viewed from slightly above:
       - All latitude lines are horizontal ellipses
       - They get "flatter" near poles, more circular near equator
       - The minor axis represents the slight viewing angle tilt

       Let me use a simpler approach: show the globe as if viewed straight-on (equator-on).
       Latitude circles appear as:
       - Equator: full circle r=104
       - 30°N/S: ellipse rx=104*cos30°=90, ry=small (like 8-10px for the 3D feel)
         Wait, in an orthographic projection with viewing direction from x-axis:
         A latitude circle at lat L (0 at equator):
           Center: (128, 128-104*sin(L))
           Radius in 2D: r_xy = 104*cos(L) [x extent], r_z = 0 [viewed flat on y-axis]
         So all lat circles just appear as horizontal lines. Not visually interesting.

       Better: use an oblique/perspective projection where we view from slightly above.
       Or simply: draw the lat circles as ellipses with ry = rx * factor where factor is small (0.15).
       This simulates a globe viewed from slightly above.

       Globe viewed from slightly above (factor=0.25 for ry):
       - Equator: rx=104, ry=26 (ry=rx*0.25), at y=128
       - 30°N: rx=90, ry=22.5, at y=128-52=76
       - 60°N: rx=52, ry=13, at y=128-90=38
       - 30°S: rx=90, ry=22.5, at y=128+52=180
       - 60°S: rx=52, ry=13, at y=128+90=218

       Longitude lines (vertical great circles): ellipses perpendicular to equatorial plane
       In this projection, longitude lines at different angles appear as:
       - 0° and 180° (prime meridian): vertical line x=128, full height (actually it's an ellipse with rx=0)
       - 90°: ellipse rx=104, ry=26 (same as equator but this is the other great circle)
         No wait, this is for a specific viewing direction.

       Let me just use a visually appealing but not perfectly accurate globe:
       - Horizontal latitude ellipses (described above)
       - Vertical longitude ellipses at 30° spacing, each appearing as a different-width vertical ellipse

       For longitude lines in an equatorial orthographic view:
       Longitude at angle φ from the facing meridian:
         rx (horizontal) = 104*sin(φ), ry (vertical) = 104*cos(φ)*factor
         Actually: vertical great circle at longitude φ appears as:
           An ellipse with rx=104*|sin(φ)|, ry=104 (full vertical extent)
           But tilted... in an orthographic equatorial view facing the prime meridian (0° long):
           - 0° longitude: vertical line (rx=0, ry=104)
           - 30° longitude: ellipse rx=104*sin(30°)=52, ry=104
           - 60° longitude: ellipse rx=104*sin(60°)=90, ry=104
           - 90° longitude: circle rx=104, ry=104

       For the oblique view from above (slight tilt factor 0.25):
       The ry values stay at 104 for longitude lines (they go full vertical), but the
       horizontal extent at equator is 104*sin(φ), and the vertical extent is 104 (full).

       This is getting complex. Let me just use SVG transforms to approximate:
  ══════════════════════════════ -->

  <!-- ══ GLOBE OUTER CIRCLE (sphere edge) ══ -->
  <!-- Outer glow -->
  <circle cx="128" cy="128" r="104"
          fill="none" stroke="#0EA5E9" stroke-width="3"
          opacity="0.35" filter="url(#I07-sphereGlow)"
          clip-path="url(#I07-card)"/>
  <!-- Main sphere edge -->
  <circle cx="128" cy="128" r="104"
          fill="none" stroke="#0284C7" stroke-width="1.5" opacity="0.6"
          clip-path="url(#I07-card)"/>

  <!-- ══ LATITUDE LINES (horizontal ellipses) ══ -->
  <g fill="none" stroke="#0A3A50" stroke-width="1" opacity="0.55"
     clip-path="url(#I07-globeClip)">
    <!-- Equator -->
    <ellipse cx="128" cy="128" rx="104" ry="26"/>
    <!-- 30°N: rx=90, ry=22, at y=76 -->
    <ellipse cx="128" cy="76" rx="90" ry="22"/>
    <!-- 60°N: rx=52, ry=13, at y=38 -->
    <ellipse cx="128" cy="38" rx="52" ry="13"/>
    <!-- 30°S: at y=180 -->
    <ellipse cx="128" cy="180" rx="90" ry="22"/>
    <!-- 60°S: at y=218 -->
    <ellipse cx="128" cy="218" rx="52" ry="13"/>
  </g>

  <!-- ══ LONGITUDE LINES (vertical ellipses) ══ -->
  <g fill="none" stroke="#083344" stroke-width="1" opacity="0.5"
     clip-path="url(#I07-globeClip)">
    <!-- Prime meridian (0°): just vertical line -->
    <line x1="128" y1="24" x2="128" y2="232"/>
    <!-- 30°E/W: rx=52, ry=104 -->
    <ellipse cx="128" cy="128" rx="52" ry="104"/>
    <!-- 60°E/W: rx=90, ry=104 -->
    <ellipse cx="128" cy="128" rx="90" ry="104"/>
    <!-- 90°E/W: equatorial (rx=104) -->
    <ellipse cx="128" cy="128" rx="104" ry="104"/>
  </g>

  <!-- ══════════════════════════════
       NEURAL NETWORK LAYER
       8 global nodes + connections

       Node positions (approximate for visual):
       N1: (128, 48)   — North (top) hub
       N2: (188, 88)   — NE hub (Europe/Asia)
       N3: (210, 140)  — E hub (Asia-Pacific)
       N4: (178, 192)  — SE hub
       N5: (128, 215)  — South hub
       N6: (68, 190)   — SW hub (Americas South)
       N7: (46, 138)   — W hub (Americas North)
       N8: (78, 88)    — NW hub (North America)
       N9: (128, 128)  — Center (HQ)
  ══════════════════════════════ -->

  <!-- Connection arcs between nodes -->
  <!-- Using straight lines for simplicity (arcs would need complex bezier calc) -->

  <!-- Connection glow layer -->
  <g stroke="#22D3EE" stroke-width="2" stroke-linecap="round" opacity="0.18"
     fill="none" filter="url(#I07-arcGlow)" clip-path="url(#I07-globeClip)">
    <line x1="128" y1="48"  x2="188" y2="88"/>
    <line x1="128" y1="48"  x2="78"  y2="88"/>
    <line x1="188" y1="88"  x2="210" y2="140"/>
    <line x1="188" y1="88"  x2="128" y2="128"/>
    <line x1="78"  y1="88"  x2="46"  y2="138"/>
    <line x1="78"  y1="88"  x2="128" y2="128"/>
    <line x1="210" y1="140" x2="178" y2="192"/>
    <line x1="210" y1="140" x2="128" y2="128"/>
    <line x1="46"  y1="138" x2="68"  y2="190"/>
    <line x1="46"  y1="138" x2="128" y2="128"/>
    <line x1="128" y1="215" x2="178" y2="192"/>
    <line x1="128" y1="215" x2="68"  y2="190"/>
    <line x1="128" y1="215" x2="128" y2="128"/>
    <!-- Cross-connections -->
    <line x1="188" y1="88"  x2="78"  y2="88"/>
    <line x1="210" y1="140" x2="46"  y2="138"/>
    <line x1="178" y1="192" x2="68"  y2="190"/>
  </g>

  <!-- Connection lines (sharp) -->
  <g stroke="#0EA5E9" stroke-width="1.2" stroke-linecap="round" opacity="0.45"
     fill="none" clip-path="url(#I07-globeClip)">
    <line x1="128" y1="48"  x2="188" y2="88"/>
    <line x1="128" y1="48"  x2="78"  y2="88"/>
    <line x1="188" y1="88"  x2="210" y2="140"/>
    <line x1="188" y1="88"  x2="128" y2="128"/>
    <line x1="78"  y1="88"  x2="46"  y2="138"/>
    <line x1="78"  y1="88"  x2="128" y2="128"/>
    <line x1="210" y1="140" x2="178" y2="192"/>
    <line x1="210" y1="140" x2="128" y2="128"/>
    <line x1="46"  y1="138" x2="68"  y2="190"/>
    <line x1="46"  y1="138" x2="128" y2="128"/>
    <line x1="128" y1="215" x2="178" y2="192"/>
    <line x1="128" y1="215" x2="68"  y2="190"/>
    <line x1="128" y1="215" x2="128" y2="128"/>
    <line x1="188" y1="88"  x2="78"  y2="88"/>
    <line x1="210" y1="140" x2="46"  y2="138"/>
    <line x1="178" y1="192" x2="68"  y2="190"/>
  </g>

  <!-- Node glow halos -->
  <g fill="#22D3EE" opacity="0.2" filter="url(#I07-nodeGlow)"
     clip-path="url(#I07-card)">
    <circle cx="128" cy="48"  r="10"/>
    <circle cx="188" cy="88"  r="9"/>
    <circle cx="210" cy="140" r="9"/>
    <circle cx="128" cy="128" r="12"/>
    <circle cx="46"  cy="138" r="9"/>
    <circle cx="78"  cy="88"  r="9"/>
    <circle cx="128" cy="215" r="9"/>
  </g>

  <!-- Node bodies -->
  <g fill="#22D3EE" clip-path="url(#I07-globeClip)">
    <circle cx="128" cy="48"  r="6"   opacity="0.95"/>
    <circle cx="188" cy="88"  r="5.5" opacity="0.9"/>
    <circle cx="210" cy="140" r="5.5" opacity="0.88"/>
    <circle cx="178" cy="192" r="4.5" opacity="0.82"/>
    <circle cx="128" cy="215" r="5"   opacity="0.85"/>
    <circle cx="68"  cy="190" r="4.5" opacity="0.82"/>
    <circle cx="46"  cy="138" r="5.5" opacity="0.88"/>
    <circle cx="78"  cy="88"  r="5.5" opacity="0.9"/>
  </g>

  <!-- Center hub (largest) -->
  <circle cx="128" cy="128" r="8" fill="#22D3EE" opacity="0.95"
          clip-path="url(#I07-globeClip)"/>
  <circle cx="128" cy="128" r="4" fill="white" opacity="0.9"
          clip-path="url(#I07-globeClip)"/>

  <!-- Node inner specular -->
  <g fill="white" opacity="0.75" clip-path="url(#I07-globeClip)">
    <circle cx="128" cy="48"  r="2.2"/>
    <circle cx="188" cy="88"  r="2"/>
    <circle cx="78"  cy="88"  r="2"/>
  </g>

  <!-- ── DATA PACKETS (traveling along connections) ── -->
  <!-- Small bright dots showing "data in transit" -->
  <g fill="#7DD3FC" opacity="0.8" clip-path="url(#I07-globeClip)">
    <circle cx="158" cy="68"  r="2"/>   <!-- N1→N2 mid -->
    <circle cx="196" cy="115" r="1.8"/> <!-- N2→N3 mid -->
    <circle cx="87"  cy="113" r="2"/>   <!-- N8→N9 mid -->
    <circle cx="168" cy="160" r="1.8"/> <!-- N3→N4 mid -->
    <circle cx="88"  cy="163" r="1.8"/> <!-- N6→N5 mid -->
  </g>

  <!-- ── INNER BORDER ── -->
  <rect x="3" y="3" width="250" height="250" rx="44"
        fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.09"/>

</svg>
