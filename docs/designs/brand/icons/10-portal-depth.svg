<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Deep cosmic background -->
    <radialGradient id="I10-bg" cx="128" cy="128" r="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0A0015"/>
      <stop offset="50%"  stop-color="#050008"/>
      <stop offset="100%" stop-color="#020006"/>
    </radialGradient>

    <!-- Accretion disk gradient: core white → orange → dark red rim -->
    <radialGradient id="I10-disk" cx="128" cy="134" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="18%"  stop-color="#FFF0B0"/>
      <stop offset="35%"  stop-color="#FF9500"/>
      <stop offset="55%"  stop-color="#FF4500"/>
      <stop offset="75%"  stop-color="#B22000"/>
      <stop offset="100%" stop-color="#3A0800" stop-opacity="0"/>
    </radialGradient>

    <!-- Event horizon: absolute black -->
    <radialGradient id="I10-horizon" cx="128" cy="128" r="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="100%" stop-color="#050008"/>
    </radialGradient>

    <!-- Photon ring glow -->
    <filter id="I10-photonGlow" x="-15%" y="-15%" width="130%" height="130%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Jet glow -->
    <filter id="I10-jetGlow" x="-50%" y="-5%" width="200%" height="110%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Lensing arc glow -->
    <filter id="I10-lensGlow" x="-20%" y="-20%" width="140%" height="140%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Disk ambient -->
    <filter id="I10-diskAura" x="-20%" y="-50%" width="140%" height="200%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip card + event horizon clip for jets -->
    <clipPath id="I10-card">
      <rect width="256" height="256" rx="46"/>
    </clipPath>

    <!-- Clip to outside the event horizon (for lensing arcs) -->
    <clipPath id="I10-outsideHorizon">
      <path d="M 0,0 H 256 V 256 H 0 Z M 128,128 m -42,0 a 42,42 0 1,0 84,0 a 42,42 0 1,0 -84,0 Z"/>
    </clipPath>

  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="256" height="256" rx="46" fill="url(#I10-bg)"/>

  <!-- ── DISTANT STAR FIELD ── -->
  <g fill="white" clip-path="url(#I10-card)">
    <circle cx="20"  cy="20"  r="0.6" opacity="0.6"/>
    <circle cx="55"  cy="14"  r="0.5" opacity="0.45"/>
    <circle cx="85"  cy="30"  r="0.5" opacity="0.5"/>
    <circle cx="200" cy="18"  r="0.6" opacity="0.55"/>
    <circle cx="235" cy="40"  r="0.5" opacity="0.4"/>
    <circle cx="240" cy="85"  r="0.5" opacity="0.45"/>
    <circle cx="15"  cy="90"  r="0.5" opacity="0.45"/>
    <circle cx="30"  cy="170" r="0.6" opacity="0.5"/>
    <circle cx="14"  cy="210" r="0.5" opacity="0.4"/>
    <circle cx="228" cy="192" r="0.5" opacity="0.45"/>
    <circle cx="242" cy="148" r="0.6" opacity="0.5"/>
    <circle cx="200" cy="235" r="0.5" opacity="0.4"/>
    <circle cx="80"  cy="240" r="0.5" opacity="0.45"/>
    <circle cx="140" cy="18"  r="0.4" opacity="0.35"/>
    <circle cx="170" cy="238" r="0.4" opacity="0.35"/>
  </g>

  <!-- ══════════════════════════════════════════════
       EVENT HORIZON BLACK HOLE
       Center: (128, 128)
       Event horizon radius: 42
       Accretion disk: ellipse, slightly below center for perspective
       Photon sphere: r=54 (just outside horizon)
       Relativistic jets: from poles (top and bottom)
  ══════════════════════════════════════════════ -->

  <!-- ── OUTER ACCRETION DISK AURA ── -->
  <!-- The accretion disk is an ellipse viewed at ~15° tilt from edge-on -->
  <!-- disk semi-major=90, semi-minor=22, center shifted down 6px for perspective -->
  <ellipse cx="128" cy="134" rx="90" ry="22"
           fill="url(#I10-disk)" opacity="0.5"
           filter="url(#I10-diskAura)"
           clip-path="url(#I10-card)"/>

  <!-- ── RELATIVISTIC JETS ── -->
  <!-- Upper jet (north polar jet) -->
  <!-- Jet glow layer -->
  <polygon points="128,86 118,24 138,24"
           fill="#4FC3F7" opacity="0.15"
           filter="url(#I10-jetGlow)"
           clip-path="url(#I10-card)"/>
  <!-- Jet sharp -->
  <polygon points="128,86 121,16 135,16"
           fill="#B3E5FC" opacity="0.55"
           clip-path="url(#I10-card)"/>
  <!-- Jet core (narrowest, brightest) -->
  <line x1="128" y1="86" x2="128" y2="14"
        stroke="white" stroke-width="1.5" opacity="0.7"
        clip-path="url(#I10-card)"/>

  <!-- Lower jet (south polar jet) -->
  <polygon points="128,170 118,232 138,232"
           fill="#4FC3F7" opacity="0.15"
           filter="url(#I10-jetGlow)"
           clip-path="url(#I10-card)"/>
  <polygon points="128,170 121,240 135,240"
           fill="#B3E5FC" opacity="0.55"
           clip-path="url(#I10-card)"/>
  <line x1="128" y1="170" x2="128" y2="242"
        stroke="white" stroke-width="1.5" opacity="0.7"
        clip-path="url(#I10-card)"/>

  <!-- ── ACCRETION DISK (main) — above and below event horizon ── -->
  <!-- Far side (behind horizon — dimmer, shows above horizon center) -->
  <ellipse cx="128" cy="128" rx="86" ry="20"
           fill="none" stroke="#FF6600" stroke-width="12"
           opacity="0.35" clip-path="url(#I10-card)"/>

  <!-- Near side (in front of horizon — brighter, below center) -->
  <ellipse cx="128" cy="140" rx="86" ry="22"
           fill="none" stroke="#FF9500" stroke-width="16"
           opacity="0.45" clip-path="url(#I10-card)"/>

  <!-- Near disk bright inner edge -->
  <ellipse cx="128" cy="140" rx="62" ry="16"
           fill="none" stroke="#FFCC00" stroke-width="8"
           opacity="0.6" clip-path="url(#I10-card)"/>

  <!-- Innermost disk (hottest — near ISCO) -->
  <ellipse cx="128" cy="142" rx="46" ry="12"
           fill="none" stroke="#FFFFFF" stroke-width="4"
           opacity="0.7" clip-path="url(#I10-card)"/>

  <!-- ── PHOTON SPHERE (brightest ring just outside horizon) ── -->
  <!-- Photon ring glow -->
  <circle cx="128" cy="128" r="54"
          fill="none" stroke="#FFF5E0" stroke-width="3"
          opacity="0.55" filter="url(#I10-photonGlow)"
          clip-path="url(#I10-card)"/>

  <!-- ── GRAVITATIONAL LENSING ARCS ──
       Bent light appearing above and below the event horizon
       (Einstein ring effect, partial arcs)
  ── -->
  <!-- Upper lensing arc -->
  <path d="M 62,110 Q 128,72 194,110"
        fill="none" stroke="#FFF0B0" stroke-width="1.8"
        opacity="0.5" filter="url(#I10-lensGlow)"
        clip-path="url(#I10-card)"/>
  <!-- Lower lensing arc -->
  <path d="M 62,146 Q 128,184 194,146"
        fill="none" stroke="#FFF0B0" stroke-width="1.8"
        opacity="0.5" filter="url(#I10-lensGlow)"
        clip-path="url(#I10-card)"/>

  <!-- Secondary lensing arcs (more subtle) -->
  <path d="M 80,100 Q 128,76 176,100"
        fill="none" stroke="#FFFDE7" stroke-width="1"
        opacity="0.3" clip-path="url(#I10-card)"/>
  <path d="M 80,156 Q 128,180 176,156"
        fill="none" stroke="#FFFDE7" stroke-width="1"
        opacity="0.3" clip-path="url(#I10-card)"/>

  <!-- ── EVENT HORIZON (absolute black — draws over everything) ── -->
  <circle cx="128" cy="128" r="42" fill="url(#I10-horizon)"/>

  <!-- ── SHADOW PHOTON RING (very thin bright ring exactly at horizon edge) ── -->
  <circle cx="128" cy="128" r="44"
          fill="none" stroke="#FF9500" stroke-width="2"
          opacity="0.65"/>
  <circle cx="128" cy="128" r="42"
          fill="none" stroke="#FFCC00" stroke-width="1"
          opacity="0.5"/>

  <!-- ── SUBTLE DUST PARTICLES in disk ── -->
  <g fill="#FFB347" opacity="0.6" clip-path="url(#I10-card)">
    <circle cx="68"  cy="137" r="1.5"/>
    <circle cx="88"  cy="148" r="1.2"/>
    <circle cx="195" cy="130" r="1.5"/>
    <circle cx="175" cy="144" r="1.2"/>
    <circle cx="108" cy="152" r="1.2"/>
    <circle cx="150" cy="150" r="1.2"/>
    <circle cx="72"  cy="126" r="1"/>
    <circle cx="186" cy="122" r="1"/>
  </g>

  <!-- ── INNER BORDER ── -->
  <rect x="3" y="3" width="250" height="250" rx="44"
        fill="none" stroke="#FF6600" stroke-width="1" opacity="0.12"/>

</svg>
