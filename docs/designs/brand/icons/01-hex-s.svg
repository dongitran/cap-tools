<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Card background gradient -->
    <linearGradient id="I01-bg" x1="0" y1="0" x2="256" y2="256"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#050F22"/>
      <stop offset="100%" stop-color="#020A18"/>
    </linearGradient>

    <!-- Hex inner fill -->
    <radialGradient id="I01-hexFill" cx="128" cy="128" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0A2060"/>
      <stop offset="100%" stop-color="#050F22"/>
    </radialGradient>

    <!-- Hex edge glow -->
    <filter id="I01-hexGlow" x="-15%" y="-15%" width="130%" height="130%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- S text glow -->
    <filter id="I01-sGlow" x="-30%" y="-20%" width="160%" height="140%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Vertex node glow -->
    <filter id="I01-nodeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="I01-card">
      <rect width="256" height="256" rx="46"/>
    </clipPath>

  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="256" height="256" rx="46" fill="url(#I01-bg)"/>

  <!-- Subtle radial ambient -->
  <circle cx="128" cy="128" r="120"
          fill="#0A2060" opacity="0.12" clip-path="url(#I01-card)"/>

  <!-- ══════════════════════════
       OUTER HEXAGON
       Flat-top, center (128,128), radius 94
       k=0: top → (128, 34)
       k=1: top-right → (128+81.4, 34+47) = (209, 81) [cos30°*94=81.4, sin30°*94=47]
       k=2: bottom-right → (209, 175)
       k=3: bottom → (128, 222)
       k=4: bottom-left → (47, 175)
       k=5: top-left → (47, 81)
  ══════════════════════════ -->

  <!-- Outer hex inner glow fill -->
  <polygon points="128,34 209,81 209,175 128,222 47,175 47,81"
           fill="url(#I01-hexFill)" clip-path="url(#I01-card)"/>

  <!-- Outer hex stroke (glow) -->
  <polygon points="128,34 209,81 209,175 128,222 47,175 47,81"
           fill="none" stroke="#2563EB" stroke-width="3.5" opacity="0.7"
           filter="url(#I01-hexGlow)"/>

  <!-- Outer hex stroke (sharp) -->
  <polygon points="128,34 209,81 209,175 128,222 47,175 47,81"
           fill="none" stroke="#3B82F6" stroke-width="2.5" opacity="0.85"/>

  <!-- Inner hexagon at radius 72:
       cos30°*72=62.4≈62, sin30°*72=36
       k=0: (128, 56) [=128-72]
       k=1: (128+62, 56+36) = (190, 92)
       k=2: (190, 164)
       k=3: (128, 200)
       k=4: (66, 164)
       k=5: (66, 92)
  -->
  <polygon points="128,56 190,92 190,164 128,200 66,164 66,92"
           fill="none" stroke="#1D4ED8" stroke-width="1.5" opacity="0.45"/>

  <!-- ── HEX VERTEX NODES ── -->
  <!-- Outer vertices (glow halos) -->
  <g fill="#22D3EE" opacity="0.25" filter="url(#I01-nodeGlow)">
    <circle cx="128" cy="34"  r="8"/>
    <circle cx="209" cy="81"  r="8"/>
    <circle cx="209" cy="175" r="8"/>
    <circle cx="128" cy="222" r="8"/>
    <circle cx="47"  cy="175" r="8"/>
    <circle cx="47"  cy="81"  r="8"/>
  </g>
  <!-- Node bodies -->
  <g fill="#22D3EE">
    <circle cx="128" cy="34"  r="5" opacity="0.9"/>
    <circle cx="209" cy="81"  r="5" opacity="0.9"/>
    <circle cx="209" cy="175" r="5" opacity="0.9"/>
    <circle cx="128" cy="222" r="5" opacity="0.9"/>
    <circle cx="47"  cy="175" r="5" opacity="0.9"/>
    <circle cx="47"  cy="81"  r="5" opacity="0.9"/>
  </g>
  <g fill="white" opacity="0.75">
    <circle cx="128" cy="34"  r="2"/>
    <circle cx="209" cy="81"  r="2"/>
    <circle cx="47"  cy="81"  r="2"/>
  </g>

  <!-- ── TECH DECORATION: Small dots on hex edges (midpoints) ── -->
  <!-- Midpoints of hex edges -->
  <g fill="#1D6AF5" opacity="0.5">
    <!-- top-right edge mid: between (128,34) and (209,81) → (168.5, 57.5) -->
    <circle cx="168" cy="58"  r="2.5"/>
    <!-- right edge mid: between (209,81) and (209,175) → (209, 128) -->
    <circle cx="209" cy="128" r="2.5"/>
    <!-- bottom-right mid: (168, 198) -->
    <circle cx="168" cy="198" r="2.5"/>
    <!-- bottom-left mid: (88, 198) -->
    <circle cx="88"  cy="198" r="2.5"/>
    <!-- left mid: (47, 128) -->
    <circle cx="47"  cy="128" r="2.5"/>
    <!-- top-left mid: (88, 58) -->
    <circle cx="88"  cy="58"  r="2.5"/>
  </g>

  <!-- ── LETTER "S" ── -->
  <!-- Glow layer -->
  <text x="128" y="158"
        text-anchor="middle"
        font-family="'Arial Black', 'Impact', 'Franklin Gothic Heavy', sans-serif"
        font-size="110" font-weight="900"
        fill="#22D3EE" opacity="0.35"
        filter="url(#I01-sGlow)">S</text>
  <!-- Main sharp S -->
  <text x="128" y="158"
        text-anchor="middle"
        font-family="'Arial Black', 'Impact', 'Franklin Gothic Heavy', sans-serif"
        font-size="110" font-weight="900"
        fill="white" opacity="0.92">S</text>

  <!-- ── INNER BORDER highlight ── -->
  <rect x="3" y="3" width="250" height="250" rx="44"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.08"/>

</svg>
