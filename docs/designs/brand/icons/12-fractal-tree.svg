  </g>

  <!-- Ground roots (subtle) -->
  <line x1="128" y1="234" x2="96"  y2="248"
        stroke="#00AA44" stroke-width="2" opacity="0.3"
        clip-path="url(#I12-card)"/>
  <line x1="128" y1="234" x2="160" y2="248"
        stroke="#00AA44" stroke-width="2" opacity="0.3"
        clip-path="url(#I12-card)"/>
  <line x1="128" y1="234" x2="128" y2="250"
        stroke="#00AA44" stroke-width="2.5" opacity="0.4"
        clip-path="url(#I12-card)"/>

  <!-- ── INNER BORDER ── -->
  <rect x="3" y="3" width="250" height="250" rx="44"
        fill="none" stroke="#00FF88" stroke-width="1" opacity="0.09"/>

</svg>
