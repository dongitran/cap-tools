        clip-path="url(#I12-card)"/>
  <line x1="144" y1="100" x2="158" y2="76"
        stroke="#14C058" stroke-width="2" opacity="0.7"
        clip-path="url(#I12-card)"/>
  <!-- From (182,106): -->
  <line x1="182" y1="106" x2="174" y2="82"
        stroke="#14C058" stroke-width="2" opacity="0.7"
        clip-path="url(#I12-card)"/>
  <line x1="182" y1="106" x2="204" y2="86"
        stroke="#14C058" stroke-width="2" opacity="0.7"
        clip-path="url(#I12-card)"/>

  <!-- ── LEVEL 4: QUATERNARY BRANCHES ── -->
  <!-- From (52,86): -->
  <line x1="52" y1="86" x2="38" y2="70"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
