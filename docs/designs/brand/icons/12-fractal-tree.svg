<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <linearGradient id="I12-bg" x1="128" y1="0" x2="128" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#000C08"/>
      <stop offset="50%"  stop-color="#020E0A"/>
      <stop offset="100%" stop-color="#040F0B"/>
    </linearGradient>

    <!-- Branch glow -->
    <filter id="I12-branchGlow" x="-30%" y="-10%" width="160%" height="120%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Leaf glow -->
    <filter id="I12-leafGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Root glow -->
    <filter id="I12-rootGlow" x="-20%" y="-10%" width="140%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="I12-card">
      <rect width="256" height="256" rx="46"/>
    </clipPath>

  </defs>

  <!-- BACKGROUND -->
  <rect width="256" height="256" rx="46" fill="url(#I12-bg)"/>

  <!-- Subtle ground ambiance -->
  <ellipse cx="128" cy="232" rx="90" ry="16"
           fill="#00FF88" opacity="0.04" clip-path="url(#I12-card)"/>

  <!--
    FRACTAL TREE — L-system inspired, 5 levels deep
    Trunk base: (128, 230) pointing up
    Each branch: parent endpoint becomes child base
    Branching angle: ±32° from parent direction
    Scale factor: 0.72 per level

    Level 0 (trunk):  (128,230)→(128,170)  length=60
    Level 1:
      Left  branch from (128,170): angle=-32° from vertical → endpoint (128-32sin32°,170-32cos32°) using L1_len=43
        = (128-22.8,170-36.4) = (105,134)
      Right branch from (128,170): angle=+32° → (151,134)

    Level 2 (from each L1 endpoint):
      From (105,134) L bend  ±32° → L=31
        LL: (105-31sin64°,134-31cos64°)=(105-27.9,134-13.5)=(77,121)
        LR: (105+31sin0°, 134-31cos0°)=(105,103)
      From (151,134) R bend  ±32° → L=31
        RL: (151-31sin0°, 134-31cos0°)=(151,103)
        RR: (151+31sin64°,134-31cos64°)=(179,121)

    Level 3 (L=22 each, ±32° compounding):
      From (77,121):
        LLL: (77-22sin96°,121-22cos96°)=(77-21.9,121+2.3)=(55,123) [going left-down slightly]
        LLR: (77+22sin32°,121-22cos32°)=(77+11.7,121-18.7)=(89,102)
      From (105,103):
        LRL: (105-22sin32°,103-22cos32°)=(105-11.7,103-18.7)=(93,84)
        LRR: (105+22sin96°,103-22cos96°)=(105+21.9,103+2.3)=(127,105)
      From (151,103):
        RLL: (151-22sin96°,103-22cos96°)=(151-21.9,103+2.3)=(129,105)
        RLR: (151+22sin32°,103-22cos32°)=(151+11.7,103-18.7)=(163,84)
      From (179,121):
        RRL: (179-22sin32°,121-22cos32°)=(179-11.7,121-18.7)=(167,102)
        RRR: (179+22sin96°,121-22cos96°)=(179+21.9,121+2.3)=(201,123)

    Level 4 (L=16, terminal leaves):
      From (55,123): endpoints ~(42,110) and (62,108)
      From (89,102): endpoints ~(76,89)  and (95,86)
      From (93,84):  endpoints ~(80,71)  and (100,68)
      From (127,105): endpoint ~(118,88) and (134,86)
      From (129,105): endpoint ~(122,88) and (138,86) [merges with above approximately]
      From (163,84): endpoint ~(152,68)  and (172,68)
      From (167,102): endpoints ~(158,86) and (175,89)
      From (201,123): endpoints ~(192,108) and (208,110)

    Let me simplify the calculation and just hardcode aesthetically:
  -->

  <!-- ── LEVEL 0: TRUNK ── -->
  <line x1="128" y1="234" x2="128" y2="172"
        stroke="#22FF88" stroke-width="5" opacity="0.85"
        filter="url(#I12-rootGlow)" clip-path="url(#I12-card)"/>
  <line x1="128" y1="234" x2="128" y2="172"
        stroke="white" stroke-width="1.5" opacity="0.5"
        clip-path="url(#I12-card)"/>

  <!-- ── LEVEL 1: PRIMARY BRANCHES ── -->
  <!-- Left primary: (128,172)→(102,132) -->
  <line x1="128" y1="172" x2="102" y2="132"
        stroke="#1EE877" stroke-width="4" opacity="0.8"
        filter="url(#I12-branchGlow)" clip-path="url(#I12-card)"/>
  <!-- Right primary: (128,172)→(154,132) -->
  <line x1="128" y1="172" x2="154" y2="132"
        stroke="#1EE877" stroke-width="4" opacity="0.8"
        filter="url(#I12-branchGlow)" clip-path="url(#I12-card)"/>

  <!-- ── LEVEL 2: SECONDARY BRANCHES ── -->
  <!-- From (102,132): -->
  <line x1="102" y1="132" x2="74" y2="106"
        stroke="#1AD469" stroke-width="2.8" opacity="0.75"
        filter="url(#I12-branchGlow)" clip-path="url(#I12-card)"/>
  <line x1="102" y1="132" x2="112" y2="100"
        stroke="#1AD469" stroke-width="2.8" opacity="0.75"
        filter="url(#I12-branchGlow)" clip-path="url(#I12-card)"/>
  <!-- From (154,132): -->
  <line x1="154" y1="132" x2="144" y2="100"
        stroke="#1AD469" stroke-width="2.8" opacity="0.75"
        filter="url(#I12-branchGlow)" clip-path="url(#I12-card)"/>
  <line x1="154" y1="132" x2="182" y2="106"
        stroke="#1AD469" stroke-width="2.8" opacity="0.75"
        filter="url(#I12-branchGlow)" clip-path="url(#I12-card)"/>

  <!-- ── LEVEL 3: TERTIARY BRANCHES ── -->
  <!-- From (74,106): -->
  <line x1="74" y1="106" x2="52" y2="86"
        stroke="#14C058" stroke-width="2" opacity="0.7"
        clip-path="url(#I12-card)"/>
  <line x1="74" y1="106" x2="82" y2="82"
        stroke="#14C058" stroke-width="2" opacity="0.7"
        clip-path="url(#I12-card)"/>
  <!-- From (112,100): -->
  <line x1="112" y1="100" x2="98" y2="76"
