        clip-path="url(#I12-card)"/>
  <!-- From (98,76): -->
  <line x1="98" y1="76" x2="88" y2="58"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>
  <line x1="98" y1="76" x2="104" y2="56"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>
  <!-- From (124,72): -->
  <line x1="124" y1="72" x2="114" y2="52"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>
  <line x1="124" y1="72" x2="128" y2="48"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>
  <!-- From (132,72): -->
  <line x1="132" y1="72" x2="128" y2="50"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>
  <line x1="132" y1="72" x2="142" y2="52"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>
  <!-- From (158,76): -->
  <line x1="158" y1="76" x2="152" y2="56"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>
  <line x1="158" y1="76" x2="168" y2="58"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>
  <!-- From (174,82): -->
  <line x1="174" y1="82" x2="166" y2="62"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>
  <line x1="174" y1="82" x2="182" y2="64"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>
  <!-- From (204,86): -->
  <line x1="204" y1="86" x2="198" y2="66"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>
  <line x1="204" y1="86" x2="218" y2="70"
        stroke="#0EAA4A" stroke-width="1.3" opacity="0.65"
        clip-path="url(#I12-card)"/>

  <!-- ── TERMINAL LEAF NODES (bioluminescent dots) ── -->
  <!-- Glow halos -->
  <g fill="#00FF88" opacity="0.22" filter="url(#I12-leafGlow)" clip-path="url(#I12-card)">
    <circle cx="38"  cy="70"  r="6"/>
    <circle cx="58"  cy="66"  r="6"/>
    <circle cx="72"  cy="64"  r="6"/>
    <circle cx="90"  cy="62"  r="6"/>
    <circle cx="88"  cy="58"  r="6"/>
    <circle cx="104" cy="56"  r="6"/>
    <circle cx="114" cy="52"  r="6"/>
    <circle cx="128" cy="48"  r="8"/>
    <circle cx="142" cy="52"  r="6"/>
    <circle cx="152" cy="56"  r="6"/>
    <circle cx="168" cy="58"  r="6"/>
    <circle cx="166" cy="62"  r="6"/>
    <circle cx="182" cy="64"  r="6"/>
    <circle cx="198" cy="66"  r="6"/>
    <circle cx="218" cy="70"  r="6"/>
  </g>
  <!-- Leaf bodies -->
  <g fill="#22FF88" clip-path="url(#I12-card)">
    <circle cx="38"  cy="70"  r="3"   opacity="0.9"/>
    <circle cx="58"  cy="66"  r="3"   opacity="0.9"/>
    <circle cx="72"  cy="64"  r="3"   opacity="0.9"/>
    <circle cx="90"  cy="62"  r="3"   opacity="0.9"/>
    <circle cx="88"  cy="58"  r="3"   opacity="0.9"/>
    <circle cx="104" cy="56"  r="3"   opacity="0.9"/>
    <circle cx="114" cy="52"  r="3.2" opacity="0.95"/>
    <circle cx="128" cy="48"  r="4.5" opacity="1"/>
    <circle cx="142" cy="52"  r="3.2" opacity="0.95"/>
    <circle cx="152" cy="56"  r="3"   opacity="0.9"/>
    <circle cx="168" cy="58"  r="3"   opacity="0.9"/>
    <circle cx="166" cy="62"  r="3"   opacity="0.9"/>
    <circle cx="182" cy="64"  r="3"   opacity="0.9"/>
    <circle cx="198" cy="66"  r="3"   opacity="0.9"/>
    <circle cx="218" cy="70"  r="3"   opacity="0.9"/>
  </g>
  <!-- White specular center -->
  <g fill="white" opacity="0.7" clip-path="url(#I12-card)">
    <circle cx="128" cy="48" r="1.8"/>
    <circle cx="114" cy="52" r="1.2"/>
    <circle cx="142" cy="52" r="1.2"/>
  </g>

  <!-- Junction nodes (branch points) -->
  <g fill="#00CC66" opacity="0.8" clip-path="url(#I12-card)">
    <circle cx="128" cy="172" r="3.5"/>
    <circle cx="102" cy="132" r="3"/>
    <circle cx="154" cy="132" r="3"/>
    <circle cx="74"  cy="106" r="2.5"/>
    <circle cx="112" cy="100" r="2.5"/>
    <circle cx="144" cy="100" r="2.5"/>
    <circle cx="182" cy="106" r="2.5"/>
    <circle cx="52"  cy="86"  r="2"/>
    <circle cx="82"  cy="82"  r="2"/>
    <circle cx="98"  cy="76"  r="2"/>
    <circle cx="124" cy="72"  r="2"/>
    <circle cx="132" cy="72"  r="2"/>
    <circle cx="158" cy="76"  r="2"/>
    <circle cx="174" cy="82"  r="2"/>
