<svg width="400" height="130" viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Sky gradient: dark purple to near-black at horizon -->
    <linearGradient id="L08-sky" x1="0" y1="0" x2="0" y2="65"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#12002A"/>
      <stop offset="100%" stop-color="#200040"/>
    </linearGradient>

    <!-- Ground gradient: very dark at horizon, slightly lighter near viewer -->
    <linearGradient id="L08-ground" x1="0" y1="65" x2="0" y2="130"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0D0020"/>
      <stop offset="100%" stop-color="#150030"/>
    </linearGradient>

    <!-- Sun gradient: orange center to magenta rim -->
    <radialGradient id="L08-sun" cx="200" cy="65" r="34"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FF9A3C"/>
      <stop offset="45%"  stop-color="#FF4B6A"/>
      <stop offset="100%" stop-color="#CC0055"/>
    </radialGradient>

    <!-- Horizontal glow for grid lines -->
    <filter id="L08-gridGlow" x="-5%" y="-50%" width="110%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="L08-textGlow" x="-20%" y="-30%" width="140%" height="160%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sun scan line clip -->
    <clipPath id="L08-sunClip">
      <circle cx="200" cy="65" r="33"/>
    </clipPath>

    <clipPath id="L08-card">
      <rect width="400" height="130" rx="14"/>
    </clipPath>

    <clipPath id="L08-ground">
      <rect x="0" y="65" width="400" height="65"/>
    </clipPath>

  </defs>

  <!-- ── CARD BACKGROUND ── -->
  <rect width="400" height="130" rx="14" fill="#12002A"/>

  <!-- ── SKY ── -->
  <rect x="0" y="0" width="400" height="65" rx="0"
        fill="url(#L08-sky)" clip-path="url(#L08-card)"/>

  <!-- ── GROUND ── -->
  <rect x="0" y="65" width="400" height="65"
        fill="#0D0020" clip-path="url(#L08-card)"/>

  <!-- ── STARS in sky ── -->
  <g fill="white" clip-path="url(#L08-card)">
    <circle cx="30"  cy="12" r="0.7" opacity="0.5"/>
    <circle cx="78"  cy="6"  r="0.6" opacity="0.4"/>
    <circle cx="135" cy="18" r="0.6" opacity="0.45"/>
    <circle cx="165" cy="8"  r="0.5" opacity="0.35"/>
    <circle cx="250" cy="14" r="0.6" opacity="0.4"/>
    <circle cx="310" cy="5"  r="0.55" opacity="0.45"/>
    <circle cx="355" cy="18" r="0.6" opacity="0.4"/>
    <circle cx="388" cy="8"  r="0.5" opacity="0.35"/>
    <circle cx="48"  cy="40" r="0.5" opacity="0.3"/>
    <circle cx="380" cy="42" r="0.5" opacity="0.3"/>
  </g>

  <!-- ── SUN ── -->
  <circle cx="200" cy="65" r="33" fill="url(#L08-sun)"/>

  <!-- Sun scan lines (horizontal stripes clipped to sun) -->
  <g clip-path="url(#L08-sunClip)" fill="#12002A">
    <rect x="167" y="33" width="66" height="2"/>
    <rect x="167" y="38" width="66" height="2"/>
    <rect x="167" y="43" width="66" height="2"/>
    <rect x="167" y="48" width="66" height="2"/>
    <rect x="167" y="53" width="66" height="2"/>
    <rect x="167" y="58" width="66" height="2"/>
    <rect x="167" y="63" width="66" height="2"/>
    <rect x="167" y="68" width="66" height="2.5"/>
    <rect x="167" y="73.5" width="66" height="2.5"/>
    <rect x="167" y="79" width="66" height="3"/>
    <rect x="167" y="85" width="66" height="3"/>
    <rect x="167" y="91" width="66" height="3"/>
  </g>

  <!-- ── HORIZON LINE ── -->
  <line x1="0" y1="65" x2="400" y2="65"
        stroke="#FF2D78" stroke-width="1.5" opacity="0.6"/>

  <!-- ══════════════════════════════
       PERSPECTIVE GRID
       Vanishing point: (200, 65)
  ══════════════════════════════ -->

  <!-- ── Vertical grid lines (from VP to bottom) ── -->
  <g stroke="#FF2D78" stroke-width="0.6" opacity="0.55"
     filter="url(#L08-gridGlow)" clip-path="url(#L08-card)">
    <!-- Each line: from VP(200,65) to bottom(x, 130) -->
    <line x1="200" y1="65" x2="0"   y2="130"/>
    <line x1="200" y1="65" x2="40"  y2="130"/>
    <line x1="200" y1="65" x2="80"  y2="130"/>
    <line x1="200" y1="65" x2="120" y2="130"/>
    <line x1="200" y1="65" x2="160" y2="130"/>
    <line x1="200" y1="65" x2="200" y2="130"/>
    <line x1="200" y1="65" x2="240" y2="130"/>
    <line x1="200" y1="65" x2="280" y2="130"/>
    <line x1="200" y1="65" x2="320" y2="130"/>
    <line x1="200" y1="65" x2="360" y2="130"/>
    <line x1="200" y1="65" x2="400" y2="130"/>
  </g>

  <!-- ── Horizontal grid lines (perspective depth, closer near viewer) ── -->
  <!-- Using perspective foreshortening: y positions closer together near horizon -->
  <!-- y=130,115,102,92,84,78,73,69,67 (each row half height of previous) -->
  <g stroke="#FF2D78" stroke-width="0.5" opacity="0.5"
     filter="url(#L08-gridGlow)" clip-path="url(#L08-card)">
    <!-- Calculate x bounds for each horizontal line via interpolation:
         at fraction t from horizon (y=65) to bottom (y=130):
         left x = 0 + (200-0)*t = 200*t ... wait no.
         The grid line at y=Y crosses the left VP-to-corner line and right VP-to-corner line.
         Left edge line: from (200,65) to (0,130) → x = 200 - 200*(Y-65)/65 = 200*(1-(Y-65)/65)
         Right edge line: from (200,65) to (400,130) → x = 200 + 200*(Y-65)/65
    -->
    <!-- y=130: x_left=0, x_right=400 -->
    <!-- y=115: t=50/65 → x_left=200*(1-50/65)=200*15/65≈46, x_right=354 -->
    <!-- y=102: t=37/65 → x_left=200*28/65≈86, x_right=314 -->
    <!-- y=92:  t=27/65 → x_left=200*38/65≈117, x_right=283 -->
    <!-- y=84:  t=19/65 → x_left=200*46/65≈141, x_right=259 -->
    <!-- y=78:  t=13/65 → x_left=200*52/65≈160, x_right=240 -->
    <!-- y=73:  t=8/65  → x_left=200*57/65≈175, x_right=225 -->
    <!-- y=69:  t=4/65  → x_left=200*61/65≈188, x_right=212 -->
    <line x1="46"  y1="115" x2="354" y2="115"/>
    <line x1="86"  y1="102" x2="314" y2="102"/>
    <line x1="117" y1="92"  x2="283" y2="92"/>
    <line x1="141" y1="84"  x2="259" y2="84"/>
    <line x1="160" y1="78"  x2="240" y2="78"/>
    <line x1="175" y1="73"  x2="225" y2="73"/>
    <line x1="188" y1="69"  x2="212" y2="69"/>
  </g>

  <!-- ── MOUNTAIN SILHOUETTES ── -->
  <g fill="#0A0018" clip-path="url(#L08-card)">
    <!-- Left mountain -->
    <polygon points="0,65 60,38 120,65"/>
    <!-- Right mountain -->
    <polygon points="280,65 340,35 400,65"/>
    <!-- Small left bump -->
    <polygon points="90,65 140,50 185,65"/>
  </g>

  <!-- Mountain rim glow -->
  <polyline points="0,65 60,38 120,65"
            stroke="#CC00AA" stroke-width="1" fill="none" opacity="0.45"/>
  <polyline points="280,65 340,35 400,65"
            stroke="#CC00AA" stroke-width="1" fill="none" opacity="0.45"/>
  <polyline points="90,65 140,50 185,65"
            stroke="#CC00AA" stroke-width="0.7" fill="none" opacity="0.3"/>

  <!-- ── TEXT OVERLAY ── -->
  <!-- Glow layer -->
  <text x="200" y="36"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="900"
        fill="#FF2D78" letter-spacing="6"
        filter="url(#L08-textGlow)" opacity="0.7">SAP TOOLS</text>
  <!-- Sharp layer -->
  <text x="200" y="36"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="900"
        fill="#FF2D78" letter-spacing="6">SAP TOOLS</text>

  <!-- Subtitle -->
  <text x="200" y="54"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" fill="#FF8FAB" letter-spacing="5" opacity="0.8">BTP DEVELOPER KIT</text>

  <!-- ── OUTER CARD BORDER highlight ── -->
  <rect x="1" y="1" width="398" height="128" rx="13"
        fill="none" stroke="#FF2D78" stroke-width="0.7" opacity="0.2"/>

</svg>
