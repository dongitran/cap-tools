<svg width="400" height="130" viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Heavy blur for far nebula clouds -->
    <filter id="L04-nebula" x="-60%" y="-60%" width="220%" height="220%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16"/>
    </filter>

    <!-- Medium blur for mid-layer clouds -->
    <filter id="L04-nebulaMid" x="-50%" y="-50%" width="200%" height="200%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9"/>
    </filter>

    <!-- Tight blur for near-core -->
    <filter id="L04-nebulaNear" x="-40%" y="-40%" width="180%" height="180%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>

    <!-- Core star glow -->
    <filter id="L04-starGlow" x="-300%" y="-300%" width="700%" height="700%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Small star glow -->
    <filter id="L04-starSmall" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="L04-card">
      <rect width="400" height="130" rx="14"/>
    </clipPath>

  </defs>

  <!-- ── BACKGROUND — deep space ── -->
  <rect width="400" height="130" rx="14" fill="#03060F"/>

  <!-- ── STAR FIELD (background stars — dim and numerous) ── -->
  <g clip-path="url(#L04-card)" fill="white">
    <!-- Background stars left region -->
    <circle cx="8"   cy="10"  r="0.5" opacity="0.4"/>
    <circle cx="22"  cy="35"  r="0.4" opacity="0.3"/>
    <circle cx="38"  cy="8"   r="0.5" opacity="0.45"/>
    <circle cx="90"  cy="18"  r="0.4" opacity="0.35"/>
    <circle cx="105" cy="42"  r="0.5" opacity="0.3"/>
    <circle cx="12"  cy="90"  r="0.4" opacity="0.4"/>
    <circle cx="55"  cy="122" r="0.5" opacity="0.35"/>
    <circle cx="112" cy="115" r="0.4" opacity="0.3"/>
    <circle cx="88"  cy="108" r="0.4" opacity="0.25"/>
    <!-- Background stars right region -->
    <circle cx="160" cy="8"   r="0.4" opacity="0.3"/>
    <circle cx="240" cy="12"  r="0.5" opacity="0.35"/>
    <circle cx="295" cy="6"   r="0.4" opacity="0.3"/>
    <circle cx="342" cy="14"  r="0.45" opacity="0.4"/>
    <circle cx="375" cy="28"  r="0.4" opacity="0.3"/>
    <circle cx="388" cy="80"  r="0.5" opacity="0.35"/>
    <circle cx="360" cy="112" r="0.4" opacity="0.3"/>
    <circle cx="205" cy="125" r="0.5" opacity="0.35"/>
    <circle cx="270" cy="118" r="0.4" opacity="0.28"/>
  </g>

  <!-- ══════════════════════════════════════
       NEBULA LAYERS (left icon region, ~130×130)
       Center: (62, 65)
  ══════════════════════════════════════ -->

  <!-- ── Layer 0: Very far, large diffuse background ── -->
  <ellipse cx="62" cy="65" rx="80" ry="55"
           fill="#3D0060" opacity="0.45"
           filter="url(#L04-nebula)"
           clip-path="url(#L04-card)"/>

  <!-- ── Layer 1: Far nebula — magenta cloud ── -->
  <ellipse cx="55" cy="55" rx="55" ry="32"
           transform="rotate(20, 55, 55)"
           fill="#C9184A" opacity="0.35"
           filter="url(#L04-nebula)"
           clip-path="url(#L04-card)"/>

  <!-- ── Layer 2: Far nebula — deep blue cloud ── -->
  <ellipse cx="75" cy="75" rx="50" ry="30"
           transform="rotate(-25, 75, 75)"
           fill="#1A0650" opacity="0.4"
           filter="url(#L04-nebula)"
           clip-path="url(#L04-card)"/>

  <!-- ── Layer 3: Mid nebula — royal blue ── -->
  <ellipse cx="65" cy="58" rx="38" ry="22"
           transform="rotate(10, 65, 58)"
           fill="#4361EE" opacity="0.45"
           filter="url(#L04-nebulaMid)"
           clip-path="url(#L04-card)"/>

  <!-- ── Layer 4: Mid nebula — pink/violet ── -->
  <ellipse cx="58" cy="72" rx="32" ry="18"
           transform="rotate(-15, 58, 72)"
           fill="#FF006E" opacity="0.3"
           filter="url(#L04-nebulaMid)"
           clip-path="url(#L04-card)"/>

  <!-- ── Layer 5: Near core — cyan/teal ── -->
  <ellipse cx="62" cy="63" rx="20" ry="12"
           fill="#00B4D8" opacity="0.5"
           filter="url(#L04-nebulaNear)"
           clip-path="url(#L04-card)"/>

  <!-- ── Layer 6: Inner warm glow ── -->
  <circle cx="62" cy="63" r="16"
          fill="#FFD6A5" opacity="0.22"
          filter="url(#L04-nebulaNear)"
          clip-path="url(#L04-card)"/>

  <!-- ── FOREGROUND STARS (brighter, over nebula) ── -->
  <g clip-path="url(#L04-card)" fill="white">
    <circle cx="30"  cy="28"  r="0.9" opacity="0.7" filter="url(#L04-starSmall)"/>
    <circle cx="95"  cy="22"  r="0.8" opacity="0.65" filter="url(#L04-starSmall)"/>
    <circle cx="108" cy="92"  r="0.75" opacity="0.6" filter="url(#L04-starSmall)"/>
    <circle cx="20"  cy="105" r="0.8" opacity="0.6" filter="url(#L04-starSmall)"/>
    <circle cx="115" cy="52"  r="0.7" opacity="0.55" filter="url(#L04-starSmall)"/>
  </g>

  <!-- ── CORE STAR — the "forge" ── -->
  <!-- Outer corona -->
  <circle cx="62" cy="63" r="22"
          fill="white" opacity="0.06"
          filter="url(#L04-starGlow)"
          clip-path="url(#L04-card)"/>
  <!-- Mid corona -->
  <circle cx="62" cy="63" r="10"
          fill="#FFF5C3" opacity="0.35"
          filter="url(#L04-starGlow)"
          clip-path="url(#L04-card)"/>
  <!-- Inner bright -->
  <circle cx="62" cy="63" r="4"
          fill="white" opacity="0.9"
          filter="url(#L04-starSmall)"/>
  <!-- Core point -->
  <circle cx="62" cy="63" r="1.8"
          fill="white" opacity="0.99"/>

  <!-- ── CROSS DIFFRACTION SPIKES (star effect) ── -->
  <g stroke="white" stroke-width="0.8" opacity="0.45">
    <!-- Horizontal -->
    <line x1="42" y1="63" x2="82" y2="63"/>
    <!-- Vertical -->
    <line x1="62" y1="43" x2="62" y2="83"/>
    <!-- Diagonal 45° -->
    <line x1="48" y1="49" x2="76" y2="77"/>
    <!-- Diagonal -45° -->
    <line x1="76" y1="49" x2="48" y2="77"/>
  </g>

  <!-- ── VERTICAL DIVIDER ── -->
  <line x1="134" y1="14" x2="134" y2="116"
        stroke="#2D0A4E" stroke-width="0.8" opacity="0.6"/>

  <!-- ── LOGO TEXT ── -->
  <text x="154" y="49"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="31" font-weight="700"
        fill="white" letter-spacing="-0.5">SAP</text>

  <text x="154" y="84"
        font-family="'Segoe UI Light', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="31" font-weight="300"
        fill="#C77DFF" letter-spacing="8">TOOLS</text>

  <!-- Purple underline -->
  <line x1="154" y1="89" x2="314" y2="89"
        stroke="#C77DFF" stroke-width="0.6" opacity="0.35"/>

  <text x="155" y="109"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" fill="#9D4EDD"
        letter-spacing="3.5" opacity="0.85">BTP DEVELOPER KIT</text>

</svg>
