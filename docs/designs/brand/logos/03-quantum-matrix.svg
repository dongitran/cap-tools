<svg width="400" height="130" viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Ambient glow for the grid area -->
    <radialGradient id="L03-aura" cx="64" cy="65" r="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#002810"/>
      <stop offset="60%"  stop-color="#010D06"/>
      <stop offset="100%" stop-color="#060E14"/>
    </radialGradient>

    <!-- Node glow -->
    <filter id="L03-nodeGlow" x="-200%" y="-200%" width="500%" height="500%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Line glow -->
    <filter id="L03-lineGlow" x="-20%" y="-20%" width="140%" height="140%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="L03-card">
      <rect width="400" height="130" rx="14"/>
    </clipPath>

  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="400" height="130" rx="14" fill="#060E14"/>
  <ellipse cx="64" cy="65" rx="85" ry="70"
           fill="url(#L03-aura)" clip-path="url(#L03-card)"/>

  <!-- ── DIM GRID NODES (all 35: 7 cols × 5 rows) ──
       cols: x = 10, 28, 46, 64, 82, 100, 118
       rows: y = 15, 40, 65, 90, 115
  ── -->
  <g fill="#0B3018" opacity="0.9">
    <!-- Row 1 -->
    <circle cx="10"  cy="15"  r="2.5"/>
    <circle cx="28"  cy="15"  r="2.5"/>
    <circle cx="46"  cy="15"  r="2.5"/>
    <circle cx="64"  cy="15"  r="2.5"/>
    <circle cx="82"  cy="15"  r="2.5"/>
    <circle cx="100" cy="15"  r="2.5"/>
    <circle cx="118" cy="15"  r="2.5"/>
    <!-- Row 2 -->
    <circle cx="10"  cy="40"  r="2.5"/>
    <circle cx="28"  cy="40"  r="2.5"/>
    <circle cx="46"  cy="40"  r="2.5"/>
    <circle cx="64"  cy="40"  r="2.5"/>
    <circle cx="82"  cy="40"  r="2.5"/>
    <circle cx="100" cy="40"  r="2.5"/>
    <circle cx="118" cy="40"  r="2.5"/>
    <!-- Row 3 -->
    <circle cx="10"  cy="65"  r="2.5"/>
    <circle cx="28"  cy="65"  r="2.5"/>
    <circle cx="46"  cy="65"  r="2.5"/>
    <circle cx="64"  cy="65"  r="2.5"/>
    <circle cx="82"  cy="65"  r="2.5"/>
    <circle cx="100" cy="65"  r="2.5"/>
    <circle cx="118" cy="65"  r="2.5"/>
    <!-- Row 4 -->
    <circle cx="10"  cy="90"  r="2.5"/>
    <circle cx="28"  cy="90"  r="2.5"/>
    <circle cx="46"  cy="90"  r="2.5"/>
    <circle cx="64"  cy="90"  r="2.5"/>
    <circle cx="82"  cy="90"  r="2.5"/>
    <circle cx="100" cy="90"  r="2.5"/>
    <circle cx="118" cy="90"  r="2.5"/>
    <!-- Row 5 -->
    <circle cx="10"  cy="115" r="2.5"/>
    <circle cx="28"  cy="115" r="2.5"/>
    <circle cx="46"  cy="115" r="2.5"/>
    <circle cx="64"  cy="115" r="2.5"/>
    <circle cx="82"  cy="115" r="2.5"/>
    <circle cx="100" cy="115" r="2.5"/>
    <circle cx="118" cy="115" r="2.5"/>
  </g>

  <!-- ── NETWORK CONNECTION LINES (between highlighted nodes) ──
       Diamond pattern: top(64,15) → mid-wide(28,65)(64,65)(100,65) → bot(64,115)
       via (46,40)(82,40) and (46,90)(82,90)
  ── -->
  <g stroke="#14F195" stroke-width="1.2" opacity="0.4" filter="url(#L03-lineGlow)">
    <!-- From top center -->
    <line x1="64"  y1="15"  x2="46"  y2="40"/>
    <line x1="64"  y1="15"  x2="82"  y2="40"/>
    <!-- From row 2 -->
    <line x1="46"  y1="40"  x2="28"  y2="65"/>
    <line x1="46"  y1="40"  x2="64"  y2="65"/>
    <line x1="82"  y1="40"  x2="64"  y2="65"/>
    <line x1="82"  y1="40"  x2="100" y2="65"/>
    <!-- From row 3 (middle) -->
    <line x1="28"  y1="65"  x2="46"  y2="90"/>
    <line x1="64"  y1="65"  x2="46"  y2="90"/>
    <line x1="64"  y1="65"  x2="82"  y2="90"/>
    <line x1="100" y1="65"  x2="82"  y2="90"/>
    <!-- From row 4 -->
    <line x1="46"  y1="90"  x2="64"  y2="115"/>
    <line x1="82"  y1="90"  x2="64"  y2="115"/>
  </g>

  <!-- ── HIGHLIGHTED NODES — diamond network ── -->
  <!-- Glow halos -->
  <g fill="#14F195" opacity="0.15" filter="url(#L03-nodeGlow)">
    <circle cx="64"  cy="15"  r="8"/>
    <circle cx="46"  cy="40"  r="7"/>
    <circle cx="82"  cy="40"  r="7"/>
    <circle cx="28"  cy="65"  r="7"/>
    <circle cx="64"  cy="65"  r="10"/>
    <circle cx="100" cy="65"  r="7"/>
    <circle cx="46"  cy="90"  r="7"/>
    <circle cx="82"  cy="90"  r="7"/>
    <circle cx="64"  cy="115" r="8"/>
  </g>

  <!-- Node bodies -->
  <g fill="#14F195">
    <!-- Top center -->
    <circle cx="64"  cy="15"  r="4.5"/>
    <!-- Row 2 -->
    <circle cx="46"  cy="40"  r="3.5"/>
    <circle cx="82"  cy="40"  r="3.5"/>
    <!-- Row 3 — wide, center is biggest -->
    <circle cx="28"  cy="65"  r="3.5"/>
    <circle cx="64"  cy="65"  r="5.5"/>
    <circle cx="100" cy="65"  r="3.5"/>
    <!-- Row 4 -->
    <circle cx="46"  cy="90"  r="3.5"/>
    <circle cx="82"  cy="90"  r="3.5"/>
    <!-- Bottom center -->
    <circle cx="64"  cy="115" r="4.5"/>
  </g>

  <!-- Inner white dots for the biggest nodes -->
  <g fill="white" opacity="0.85">
    <circle cx="64"  cy="15"  r="1.6"/>
    <circle cx="64"  cy="65"  r="2"/>
    <circle cx="64"  cy="115" r="1.6"/>
  </g>

  <!-- ── VERTICAL DIVIDER ── -->
  <line x1="134" y1="14" x2="134" y2="116"
        stroke="#0B3018" stroke-width="0.8" opacity="0.6"/>

  <!-- ── LOGO TEXT ── -->
  <text x="154" y="49"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="31" font-weight="700"
        fill="white" letter-spacing="-0.5">SAP</text>

  <text x="154" y="84"
        font-family="'Segoe UI Light', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="31" font-weight="300"
        fill="#14F195" letter-spacing="8">TOOLS</text>

  <!-- Green accent underline -->
  <line x1="154" y1="89" x2="314" y2="89"
        stroke="#14F195" stroke-width="0.6" opacity="0.35"/>

  <text x="155" y="109"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" fill="#14F195"
        letter-spacing="3.5" opacity="0.7">BTP DEVELOPER KIT</text>

</svg>
