name: Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
    paths:
      - 'src/**'
      - 'resources/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'

permissions:
  contents: write
  issues: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate root project
        run: npm run validate:root

      - name: Build extension
        run: npm run build

      - name: Extract version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run package -- --out sap-tools-${{ steps.version.outputs.VERSION }}.vsix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: SAP Tools v${{ steps.version.outputs.VERSION }}
          body: |
            ## SAP Tools ${{ github.ref_name }}

            ### Installation
            Download the `.vsix` file below and install via:
            ```
            code --install-extension sap-tools-${{ steps.version.outputs.VERSION }}.vsix
            ```

            ### Changes
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          files: sap-tools-${{ steps.version.outputs.VERSION }}.vsix
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}

      - name: Resolve publish flavor
        id: flavor
        if: "startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-') || github.ref_type == 'branch'"
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MINOR=$(node -p "require('./package.json').version.split('.')[1]")
          if [ $((MINOR % 2)) -eq 1 ]; then
            echo "script=publish:pre" >> "$GITHUB_OUTPUT"
            echo "flavor=pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "script=publish" >> "$GITHUB_OUTPUT"
            echo "flavor=stable" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected version=${VERSION} → ${MINOR} → publishing as ${flavor:-stable}"

      - name: Publish to VS Marketplace
        if: "startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-') || github.ref_type == 'branch'"
        run: |
          npm run ${{ steps.flavor.outputs.script }}
          echo "Published ${{ steps.flavor.outputs.flavor }} build to VS Marketplace successfully"
        env:
          VSCE_PAT: ${{ secrets.AZURE_PAT }}

  notify:
    name: Notify on Failure
    needs: release
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release failed for ${context.ref}`,
              body: `Release workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'release']
            })
