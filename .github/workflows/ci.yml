name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Spell check
        run: npm run cspell

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  build:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify bundle size
        run: |
          SIZE=$(stat -c%s dist/extension.js 2>/dev/null || stat -f%z dist/extension.js)
          echo "Bundle size: ${SIZE} bytes"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "ERROR: Bundle exceeds 5MB limit"
            exit 1
          fi

      - name: Install E2E dependencies
        run: npm --prefix e2e ci

      - name: Validate E2E project
        run: npm --prefix e2e run validate

      - name: Install VS Code for E2E
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gpg
          wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo install -D -o root -g root -m 644 microsoft.gpg /etc/apt/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main" | sudo tee /etc/apt/sources.list.d/vscode.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y code

      - name: Run E2E tests
        env:
          VSCODE_EXECUTABLE_PATH: /usr/share/code/code
        run: npm --prefix e2e test

      - name: Package VSIX (dry run)
        run: npm run package -- --out /tmp/sap-tools-ci.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-ci-${{ github.run_number }}
          path: /tmp/sap-tools-ci.vsix
          retention-days: 7
