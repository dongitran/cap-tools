name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Spell check
        run: npm run cspell

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  build:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify bundle size
        run: |
          SIZE=$(stat -c%s dist/extension.js 2>/dev/null || stat -f%z dist/extension.js)
          echo "Bundle size: ${SIZE} bytes"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "ERROR: Bundle exceeds 5MB limit"
            exit 1
          fi

      - name: Upload extension build
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: dist
          retention-days: 7

  e2e-validate:
    name: Validate E2E Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        run: npm --prefix e2e ci

      - name: Validate E2E project
        run: npm --prefix e2e run validate

      - name: Validate E2E lane map
        run: node scripts/run-e2e-lane.mjs --validate

  e2e:
    name: E2E Lane ${{ matrix.lane }} (~${{ matrix.expected }}s)
    runs-on: ubuntu-latest
    needs: [build, e2e-validate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: '01'
            expected: '84.1'
          - lane: '02'
            expected: '84.0'
          - lane: '03'
            expected: '84.0'
          - lane: '04'
            expected: '82.6'
          - lane: '05'
            expected: '80.5'
          - lane: '06'
            expected: '80.3'
          - lane: '07'
            expected: '85.9'
          - lane: '08'
            expected: '85.7'
          - lane: '09'
            expected: '85.4'
          - lane: '10'
            expected: '84.8'
          - lane: '11'
            expected: '84.7'
          - lane: '12'
            expected: '84.6'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download extension build
        uses: actions/download-artifact@v4
        with:
          name: extension-dist
          path: dist

      - name: Install E2E dependencies
        run: npm --prefix e2e ci

      - name: Install VS Code for E2E
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gpg xvfb
          wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo install -D -o root -g root -m 644 microsoft.gpg /etc/apt/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main" | sudo tee /etc/apt/sources.list.d/vscode.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y code

      - name: Run E2E tests
        env:
          VSCODE_EXECUTABLE_PATH: /usr/share/code/code
        run: xvfb-run -a node scripts/run-e2e-lane.mjs ${{ matrix.lane }}

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-lane-${{ matrix.lane }}
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: [build, e2e]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download extension build
        uses: actions/download-artifact@v4
        with:
          name: extension-dist
          path: dist

      - name: Package VSIX (dry run)
        run: npm run package -- --out /tmp/sap-tools-ci.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-ci-${{ github.run_number }}
          path: /tmp/sap-tools-ci.vsix
          retention-days: 7
